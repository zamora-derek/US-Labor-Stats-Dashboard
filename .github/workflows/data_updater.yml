name: Monthly Data Updater

on:
  schedule:
    - cron: '0 13 7 * *' # BLS data releases first Friday 12:30 UTC, monthly
  workflow_dispatch: 

jobs:
  update-bls-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run data collector
        run: python scripts/data_collector.py

      - name: Run state data collector
        run: python scripts/state_data_collector.py

      - name: Commit and push data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bls_data.csv data/state_data.csv# Matches the file name from your script
          git commit -m "Automated data update: $(date +'%Y-%m-%d')" || echo "No changes"
          git push
